services:
  bigtable-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    container_name: bigtable-emulator
    restart: unless-stopped
    ports:
      - "8086:8086"
    command: gcloud beta emulators bigtable start --host-port=0.0.0.0:8086
    healthcheck:
      # gRPC port — use bash tcp check since curl won't work against gRPC
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8086' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  bigtable-init:
    # Use full image so cbt tool is available
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    container_name: bigtable-init
    depends_on:
      bigtable-emulator:
        condition: service_healthy
    restart: "no"
    environment:
      BIGTABLE_EMULATOR_HOST: bigtable-emulator:8086
      PROJECT_ID: lively-synapse-400818
    volumes:
      - ./init-tables.sh:/init-tables.sh:ro
    entrypoint: ["/bin/bash", "/init-tables.sh"]
